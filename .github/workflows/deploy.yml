name: Deploy Backend to VPS

on:
  push:
    branches:
      - developer # Kích hoạt tự động khi push vào nhánh developer

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Di chuyển vào thư mục code trên VPS
            cd /var/www/unilife-backend

            # Kéo code mới nhất từ nhánh developer về
            git pull origin developer

            # Cài đặt thư viện mới nếu có thay đổi trong package.json
            npm install

            # Restart lại app trên PM2 để áp dụng code mới
            pm2 restart unilife-backend
